services:
  # === Dominio 1: tienda-acme.com (+ comodín y locales) ===
  # Corre PRIMERO: crea la rootCA y genera el cert de tienda-acme
  ssl-tienda-acme:
    image: alpine/mkcert
    container_name: mkcert_tienda_acme
    volumes:
      - ./certificados:/certs
    working_dir: /certs/tienda-acme
    environment:
      - CAROOT=/certs
    command: ["tienda-acme.com", "*.tienda-acme.com", "localhost", "127.0.0.1", "web-service"]

  # === Dominio 2: nurcito.com (+ comodín) ===
  # Corre DESPUÉS de tienda-acme para reutilizar la rootCA ya creada
  ssl-nurcito:
    image: alpine/mkcert
    container_name: mkcert_nurcito
    volumes:
      - ./certificados:/certs
    working_dir: /certs/nurcito
    environment:
      - CAROOT=/certs
    command: ["nurcito.com", "*.nurcito.com"]
    depends_on:
      ssl-tienda-acme:
        condition: service_completed_successfully
