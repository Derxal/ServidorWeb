server {
    listen 80;
    server_name localhost;

    # --- RRHH ---
    # http://localhost:8001/rrhh/usuarios  ->  contenedor module-rrhh  ->  /usuarios
    location /rrhh/ {
        proxy_pass http://module-rrhh:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- MARKETING ---
    # http://localhost:8001/marketing/  ->  contenedor node-marketing  ->  /
    location /marketing/ {
        proxy_pass http://node-marketing:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Redirige las rutas sin barra final para que no den 404
    location = /rrhh      { return 301 /rrhh/; }
    location = /marketing { return 301 /marketing/; }
}
