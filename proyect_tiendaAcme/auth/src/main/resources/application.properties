spring.application.name=proyect-auth

# ===============================
# JWT Configuration
# ===============================
# Cambiar este valor en produccion por una clave de al menos 256 bits en Base64
jwt.secret=cHJveWVjdC1hdXRoLXNlY3JldC1rZXktZm9yLWp3dC0yMDI1
# Access token: 1 hora (en milisegundos)
jwt.expiration=3600000
# Refresh token: 7 dias (en milisegundos)
jwt.refresh-expiration=604800000

# ===============================
# Conexión a base de datos MySQL
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/tiendaacme_auth?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# Configuración JPA / Hibernate
# ===============================
# Liquibase gestiona el schema — Hibernate solo valida
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# Liquibase
# ===============================
spring.liquibase.enabled=false
