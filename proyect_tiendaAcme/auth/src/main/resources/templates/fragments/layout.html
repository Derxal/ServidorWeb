<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- ── HEAD fragment ── -->
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">Auth Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f0f2f5; }
        .sidebar {
            width: 240px;
            min-height: 100vh;
            background: linear-gradient(180deg, #1a1f3c 0%, #16213e 100%);
            position: fixed;
            top: 0; left: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }
        .sidebar .nav-link {
            color: #a8b2d8;
            border-radius: 8px;
            margin: 2px 8px;
            padding: 10px 14px;
            font-size: .9rem;
            transition: all .2s;
        }
        .sidebar .nav-link:hover, .sidebar .nav-link.active {
            color: #fff;
            background: rgba(255,255,255,.1);
        }
        .sidebar .nav-link i { width: 20px; }
        .sidebar-logo {
            color: #fff;
            font-size: 1.15rem;
            font-weight: 700;
            padding: 20px 20px 10px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-logo i { color: #6c8cff; font-size: 1.5rem; }
        .sidebar-section {
            font-size: .7rem;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: #4a5580;
            padding: 16px 20px 6px;
        }
        .main-content {
            margin-left: 240px;
            min-height: 100vh;
        }
        .topbar {
            background: #fff;
            border-bottom: 1px solid #e5e9f0;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .stat-card { border: none; border-radius: 12px; transition: transform .2s; }
        .stat-card:hover { transform: translateY(-2px); }
        .stat-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem;
        }
        .badge-role-ADMIN { background: #fef3c7; color: #92400e; }
        .badge-role-USER  { background: #dbeafe; color: #1e40af; }
        .table th { font-size: .78rem; text-transform: uppercase; letter-spacing: .05em; color: #6b7280; border-top: none; }
        .action-btn { padding: 4px 10px; font-size: .8rem; }
    </style>
</head>

<!-- ── SIDEBAR fragment ── -->
<nav th:fragment="sidebar(active)" class="sidebar">
    <a href="/admin/dashboard" class="sidebar-logo">
        <i class="bi bi-shield-lock-fill"></i>
        <span>Auth Admin</span>
    </a>
    <hr style="border-color:rgba(255,255,255,.08); margin:0 16px 8px;">

    <span class="sidebar-section">General</span>
    <ul class="nav flex-column mb-2">
        <li class="nav-item">
            <a th:href="@{/admin/dashboard}"
               th:classappend="${active == 'dashboard'} ? 'active' : ''"
               class="nav-link">
                <i class="bi bi-speedometer2 me-2"></i>Dashboard
            </a>
        </li>
    </ul>

    <span class="sidebar-section">Gestión</span>
    <ul class="nav flex-column mb-2">
        <li class="nav-item">
            <a th:href="@{/admin/users}"
               th:classappend="${active == 'users'} ? 'active' : ''"
               class="nav-link">
                <i class="bi bi-people me-2"></i>Usuarios
            </a>
        </li>
        <li class="nav-item">
            <a th:href="@{/admin/sessions}"
               th:classappend="${active == 'sessions'} ? 'active' : ''"
               class="nav-link">
                <i class="bi bi-key me-2"></i>Sesiones
            </a>
        </li>
    </ul>

    <div class="mt-auto pb-3">
        <hr style="border-color:rgba(255,255,255,.08); margin:0 16px 8px;">
        <form th:action="@{/admin/logout}" method="post" class="px-2">
            <button type="submit" class="nav-link btn btn-link text-start w-100 border-0 p-0">
                <i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión
            </button>
        </form>
    </div>
</nav>

</html>
