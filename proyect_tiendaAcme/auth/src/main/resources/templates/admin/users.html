<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('Usuarios — Auth Admin')}"></head>
<body>

<div th:replace="~{fragments/layout :: sidebar('users')}"></div>

<div class="main-content">
    <div class="topbar">
        <div>
            <h5 class="mb-0 fw-semibold">Gestión de Usuarios</h5>
            <small class="text-muted" th:text="${#lists.size(users) + ' usuarios registrados'}">0 usuarios</small>
        </div>
    </div>

    <div class="p-4">
        <!-- Alerts -->
        <div th:if="${success}" class="alert alert-success alert-dismissible d-flex align-items-center gap-2 fade show" role="alert">
            <i class="bi bi-check-circle-fill"></i>
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0" id="usersTable">
                        <thead class="bg-light">
                            <tr>
                                <th class="ps-4">#</th>
                                <th>Usuario</th>
                                <th>Email</th>
                                <th>Rol</th>
                                <th>Estado</th>
                                <th>Sesiones</th>
                                <th class="text-end pe-4">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="user : ${users}">
                                <td class="ps-4 text-muted small" th:text="${user.id}">1</td>
                                <td>
                                    <div class="d-flex align-items-center gap-2">
                                        <div class="rounded-circle bg-primary d-flex align-items-center justify-content-center text-white fw-bold"
                                             style="width:36px;height:36px;font-size:.85rem"
                                             th:text="${#strings.substring(user.name,0,1).toUpperCase()}">A</div>
                                        <div>
                                            <div class="fw-semibold small" th:text="${user.name + ' ' + user.lastName}">Nombre</div>
                                        </div>
                                    </div>
                                </td>
                                <td class="text-muted small" th:text="${user.email}">email</td>
                                <td>
                                    <span class="badge rounded-pill px-2 py-1"
                                          th:classappend="${user.role == 'ADMIN'} ? 'badge-role-ADMIN' : 'badge-role-USER'"
                                          th:text="${user.role}">USER</span>
                                </td>
                                <td>
                                    <span th:if="${user.active}" class="badge bg-success-subtle text-success rounded-pill">
                                        <i class="bi bi-circle-fill me-1" style="font-size:.4rem"></i>Activo
                                    </span>
                                    <span th:unless="${user.active}" class="badge bg-secondary-subtle text-secondary rounded-pill">
                                        <i class="bi bi-circle-fill me-1" style="font-size:.4rem"></i>Inactivo
                                    </span>
                                </td>
                                <td>
                                    <span class="badge bg-light text-dark border" th:text="${user.activeSessions}">0</span>
                                </td>
                                <td class="text-end pe-4">
                                    <div class="d-flex gap-1 justify-content-end flex-wrap">
                                        <!-- Cambiar rol -->
                                        <form th:action="@{/admin/users/{id}/role(id=${user.id})}" method="post" class="d-inline">
                                            <select name="role" class="form-select form-select-sm d-inline-block w-auto action-btn"
                                                    onchange="this.form.submit()"
                                                    th:value="${user.role}">
                                                <option value="USER"  th:selected="${user.role == 'USER'}">USER</option>
                                                <option value="ADMIN" th:selected="${user.role == 'ADMIN'}">ADMIN</option>
                                            </select>
                                        </form>
                                        <!-- Toggle activo -->
                                        <form th:action="@{/admin/users/{id}/toggle(id=${user.id})}" method="post" class="d-inline">
                                            <button type="submit"
                                                    th:class="${user.active} ? 'btn btn-sm btn-outline-warning action-btn' : 'btn btn-sm btn-outline-success action-btn'"
                                                    th:title="${user.active} ? 'Desactivar' : 'Activar'">
                                                <i th:class="${user.active} ? 'bi bi-pause-circle' : 'bi bi-play-circle'"></i>
                                            </button>
                                        </form>
                                        <!-- Revocar sesiones -->
                                        <form th:action="@{/admin/users/{id}/revoke-sessions(id=${user.id})}" method="post" class="d-inline"
                                              th:if="${user.activeSessions > 0}">
                                            <button type="submit" class="btn btn-sm btn-outline-danger action-btn" title="Revocar sesiones">
                                                <i class="bi bi-slash-circle"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(users)}">
                                <td colspan="7" class="text-center text-muted py-5">
                                    <i class="bi bi-people d-block mb-2" style="font-size:2rem"></i>
                                    No hay usuarios registrados
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
