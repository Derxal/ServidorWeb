<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('Dashboard — Auth Admin')}"></head>
<body>

<div th:replace="~{fragments/layout :: sidebar('dashboard')}"></div>

<div class="main-content">
    <!-- Topbar -->
    <div class="topbar">
        <div>
            <h5 class="mb-0 fw-semibold">Dashboard</h5>
            <small class="text-muted">Vista general del sistema de autenticación</small>
        </div>
        <span class="badge bg-success px-3 py-2">
            <i class="bi bi-circle-fill me-1" style="font-size:.5rem"></i>En línea
        </span>
    </div>

    <div class="p-4">
        <!-- Stats cards -->
        <div class="row g-3 mb-4">
            <div class="col-12 col-sm-6 col-xl-3">
                <div class="card stat-card shadow-sm p-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <p class="text-muted small mb-1">Total Usuarios</p>
                            <h3 class="fw-bold mb-0" th:text="${stats.totalUsers}">0</h3>
                        </div>
                        <div class="stat-icon" style="background:#ede9fe">
                            <i class="bi bi-people-fill" style="color:#7c3aed"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-sm-6 col-xl-3">
                <div class="card stat-card shadow-sm p-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <p class="text-muted small mb-1">Usuarios Activos</p>
                            <h3 class="fw-bold mb-0" th:text="${stats.activeUsers}">0</h3>
                        </div>
                        <div class="stat-icon" style="background:#d1fae5">
                            <i class="bi bi-person-check-fill" style="color:#059669"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-sm-6 col-xl-3">
                <div class="card stat-card shadow-sm p-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <p class="text-muted small mb-1">Sesiones Activas</p>
                            <h3 class="fw-bold mb-0" th:text="${stats.activeSessions}">0</h3>
                        </div>
                        <div class="stat-icon" style="background:#fef3c7">
                            <i class="bi bi-key-fill" style="color:#d97706"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-sm-6 col-xl-3">
                <div class="card stat-card shadow-sm p-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <p class="text-muted small mb-1">Administradores</p>
                            <h3 class="fw-bold mb-0" th:text="${stats.adminCount}">0</h3>
                        </div>
                        <div class="stat-icon" style="background:#fee2e2">
                            <i class="bi bi-shield-fill-check" style="color:#dc2626"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Recent users table -->
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white border-0 pt-3 pb-0 d-flex justify-content-between align-items-center">
                <h6 class="fw-semibold mb-0">Usuarios recientes</h6>
                <a th:href="@{/admin/users}" class="btn btn-sm btn-outline-primary">Ver todos</a>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light">
                            <tr>
                                <th class="ps-4">Nombre</th>
                                <th>Email</th>
                                <th>Rol</th>
                                <th>Estado</th>
                                <th>Sesiones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="user : ${recentUsers}">
                                <td class="ps-4">
                                    <div class="d-flex align-items-center gap-2">
                                        <div class="rounded-circle bg-primary d-flex align-items-center justify-content-center text-white fw-bold"
                                             style="width:34px;height:34px;font-size:.85rem"
                                             th:text="${#strings.substring(user.name,0,1).toUpperCase()}">A</div>
                                        <span th:text="${user.name + ' ' + user.lastName}">Nombre</span>
                                    </div>
                                </td>
                                <td class="text-muted" th:text="${user.email}">email</td>
                                <td>
                                    <span class="badge rounded-pill px-2 py-1"
                                          th:classappend="${user.role == 'ADMIN'} ? 'badge-role-ADMIN' : 'badge-role-USER'"
                                          th:text="${user.role}">USER</span>
                                </td>
                                <td>
                                    <span th:if="${user.active}" class="badge bg-success-subtle text-success rounded-pill">Activo</span>
                                    <span th:unless="${user.active}" class="badge bg-secondary-subtle text-secondary rounded-pill">Inactivo</span>
                                </td>
                                <td>
                                    <span class="badge bg-light text-dark border" th:text="${user.activeSessions}">0</span>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(recentUsers)}">
                                <td colspan="5" class="text-center text-muted py-4">No hay usuarios registrados</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
