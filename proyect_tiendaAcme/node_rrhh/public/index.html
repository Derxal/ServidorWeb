<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RRHH · Tienda ACME</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Tienda <span>ACME</span></h1>
      <p>Módulo de Recursos Humanos</p>
    </header>

    <!-- Formulario agregar / editar -->
    <div class="card">
      <h2 id="form-titulo">Agregar usuario</h2>
      <div class="form-row">
        <input type="hidden" id="edit-id" />
        <input type="text" id="input-nombre" placeholder="Nombre" />
        <input type="email" id="input-email" placeholder="Email" />
        <button class="btn-primary" onclick="guardar()">Guardar</button>
        <button class="btn-edit" id="btn-cancelar" onclick="cancelarEdicion()" style="display:none">Cancelar</button>
      </div>
    </div>

    <!-- Tabla de usuarios -->
    <div class="card">
      <h2>Usuarios</h2>
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Nombre</th>
            <th>Email</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla-body"></tbody>
      </table>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
