# ── HTTP → HTTPS (todos los subdominios) ─────────────────────────────────────
server {
    listen 80;
    server_name tienda-acme.com www.tienda-acme.com
                rrhh.tienda-acme.com ventas.tienda-acme.com
                auth.tienda-acme.com;

    return 301 https://$host$request_uri;
}
# ─────────────────────────────────────────────────────────────────────────────


# ── MÓDULO RRHH ───────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name rrhh.tienda-acme.com;

    ssl_certificate     /etc/nginx/certs/tienda-acme/tienda-acme.com+4.pem;
    ssl_certificate_key /etc/nginx/certs/tienda-acme/tienda-acme.com+4-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        resolver 127.0.0.11 valid=30s;
        set $backend_rrhh module-rrhh:3000;
        proxy_pass http://$backend_rrhh;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
# ── FIN MÓDULO RRHH ───────────────────────────────────────────────────────────


# ── MÓDULO VENTAS ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name ventas.tienda-acme.com;

    ssl_certificate     /etc/nginx/certs/tienda-acme/tienda-acme.com+4.pem;
    ssl_certificate_key /etc/nginx/certs/tienda-acme/tienda-acme.com+4-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        resolver 127.0.0.11 valid=30s;
        set $backend_ventas module-ventas:3000;
        proxy_pass http://$backend_ventas;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
# ── FIN MÓDULO VENTAS ─────────────────────────────────────────────────────────


# ── MÓDULO AUTH ───────────────────────────────────────────────────────────────
# Solo expone /api/** — el panel /admin/** queda bloqueado (404)
server {
    listen 443 ssl;
    server_name auth.tienda-acme.com;

    ssl_certificate     /etc/nginx/certs/tienda-acme/tienda-acme.com+4.pem;
    ssl_certificate_key /etc/nginx/certs/tienda-acme/tienda-acme.com+4-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $backend_auth module-auth:8080;
        proxy_pass http://$backend_auth;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        return 404;
    }
}
# ── FIN MÓDULO AUTH ───────────────────────────────────────────────────────────


# ── MÓDULO FRONTEND ───────────────────────────────────────────────────────────
# Sirve el React y enruta las llamadas /api/* a auth y ventas
server {
    listen 443 ssl;
    server_name tienda-acme.com www.tienda-acme.com;

    ssl_certificate     /etc/nginx/certs/tienda-acme/tienda-acme.com+4.pem;
    ssl_certificate_key /etc/nginx/certs/tienda-acme/tienda-acme.com+4-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location /api/auth/ {
        resolver 127.0.0.11 valid=30s;
        set $backend_auth module-auth:8080;
        proxy_pass http://$backend_auth;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/users/ {
        resolver 127.0.0.11 valid=30s;
        set $backend_auth module-auth:8080;
        proxy_pass http://$backend_auth;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/dashboard/ {
        resolver 127.0.0.11 valid=30s;
        set $backend_auth module-auth:8080;
        proxy_pass http://$backend_auth;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/productos/ {
        resolver 127.0.0.11 valid=30s;
        set $backend_ventas module-ventas:3000;
        proxy_pass http://$backend_ventas;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ventas/ {
        resolver 127.0.0.11 valid=30s;
        set $backend_ventas module-ventas:3000;
        proxy_pass http://$backend_ventas;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        resolver 127.0.0.11 valid=30s;
        set $backend_frontend module-frontend:80;
        proxy_pass http://$backend_frontend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
# ── FIN MÓDULO FRONTEND ───────────────────────────────────────────────────────
