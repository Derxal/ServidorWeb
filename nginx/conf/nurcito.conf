# =====================================================================
#  Dominio: nurcito.com
# =====================================================================

# --- HTTP (puerto 80): redirige a HTTPS ---
server {
    listen 80;
    server_name nurcito.com www.nurcito.com;

    return 301 https://$host$request_uri;
}

# --- HTTPS: nurcito.com -> contenedor nurcito ---
server {
    listen 443 ssl;
    server_name nurcito.com www.nurcito.com;

    ssl_certificate     /etc/nginx/certs/nurcito/nurcito.com+1.pem;
    ssl_certificate_key /etc/nginx/certs/nurcito/nurcito.com+1-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        resolver 127.0.0.11 valid=30s;
        set $backend module-nurcito:80;
        proxy_pass http://$backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
